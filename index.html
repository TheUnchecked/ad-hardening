<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AD Hardening — TheUnchecked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ── scan-line overlay ── -->
  <div class="scanlines"></div>

  <!-- ══════════════════════════════════════════════════════ HEADER -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo">&lt;/&gt;</span>
      <h1 class="topbar__title">AD Hardening <span class="topbar__sep">—</span> TheUnchecked</h1>
    </div>
    <div class="topbar__actions">
      <button id="btn-menu" class="topbar__menu-btn" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════ LAYOUT -->
  <div class="layout">

    <!-- ── sidebar ── -->
    <aside id="sidebar" class="sidebar">
      <nav class="sidebar__nav" id="sidebar-nav"></nav>
    </aside>

    <!-- ── main ── -->
    <main class="main">

      <!-- filters -->
      <section class="filters">
        <div class="filters__pills" id="severity-pills">
          <button class="pill pill--critical active" data-severity="critical">Critico</button>
          <button class="pill pill--high active"     data-severity="high">Alto</button>
          <button class="pill pill--medium active"   data-severity="medium">Medio</button>
          <button class="pill pill--low active"      data-severity="low">Basso</button>
        </div>
        <div class="filters__search">
          <svg class="filters__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="filters__input" placeholder="Cerca..." />
        </div>
      </section>

      <!-- checklist container -->
      <div id="checklist" class="checklist"></div>

    </main>
  </div>

  <!-- ══════════════════════════════════════════════════════ FOOTER -->
  <footer class="footer">
    <span>&copy; 2026 TheUnchecked — AD Hardening Checklist</span>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
