<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AD Hardening — TheUnchecked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⬡</span>
      <span class="sidebar-title">AD Hardening</span>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">Categorie</span>
      <ul id="category-nav"></ul>
    </nav>

    <div class="sidebar-footer">
      <button id="btn-reset" title="Azzera tutte le spunte">↺ Reset</button>
      <button id="btn-export" title="Esporta checklist">⬇ Export</button>
    </div>
  </aside>

  <!-- TOGGLE SIDEBAR MOBILE -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>

  <!-- MAIN -->
  <main class="main">

    <header class="page-header">
      <h1>Active Directory<br /><span>Best Practices</span></h1>
      <p class="page-subtitle">Checklist interattiva per l'hardening di Active Directory on-premises</p>

      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Cerca controllo…" autocomplete="off" />
        </div>
        <div class="filter-wrap">
          <button class="filter-btn active" data-severity="all">Tutti</button>
          <button class="filter-btn" data-severity="critical">🔴 Critico</button>
          <button class="filter-btn" data-severity="high">🟠 Alto</button>
          <button class="filter-btn" data-severity="medium">🟡 Medio</button>
          <button class="filter-btn" data-severity="low">🟢 Basso</button>
        </div>
        <div class="progress-wrap">
          <span id="progress-label">0 / 0</span>
          <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
      </div>
    </header>

    <div id="content" class="content"></div>

  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
